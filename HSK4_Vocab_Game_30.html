<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK4 单词闪卡挑战</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #888888;
            --correct: #4CAF50;
            --wrong: #F44336;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei';
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }
        .game-container {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: bold;
        }
        .flashcard {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            padding: 40px 20px;
            border-radius: 15px;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .mode-hint {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
            font-weight: normal;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-family: inherit;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e2e6ea;
            border-color: #dae0e5;
            transform: translateY(-2px);
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .option-btn.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
        }
        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background-color: #357ABD;
        }
        .result-score {
            font-size: 48px;
            color: var(--primary);
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- 开始界面 -->
    <div id="start-screen" class="screen active">
        <h1>HSK4 单词挑战</h1>
        <p>第一部分 (第1-4课) 词汇复习</p>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 20px;">
            共30题<br>前15题：俄译中<br>后15题：中译俄
        </p>
        <button class="btn-primary" onclick="startGame()">开始游戏</button>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="screen">
        <div class="status-bar">
            <span id="progress-text">进度: 1/30</span>
            <span id="score-text">得分: 0</span>
        </div>
        <div class="flashcard">
            <div id="mode-hint" class="mode-hint">请选择对应的中文</div>
            <div id="question-word">Загрузка...</div>
        </div>
        <div class="options-grid" id="options-container">
            <!-- 选项按钮会通过JS动态生成 -->
        </div>
    </div>

    <!-- 结束界面 -->
    <div id="end-screen" class="screen">
        <h1>挑战结束！</h1>
        <div class="result-score" id="final-score">0/30</div>
        <p id="result-message">太棒了！</p>
        <button class="btn-primary" onclick="startGame()">再玩一次</button>
    </div>
</div>

<script>
    // 词汇库 (第1-4课精选核心词汇)
    const vocabDB = [
        { zh: "法律", ru: "закон" }, { zh: "印象", ru: "впечатление" },
        { zh: "熟悉", ru: "быть знакомым" }, { zh: "性格", ru: "характер" },
        { zh: "开玩笑", ru: "шутить" }, { zh: "共同", ru: "общий" },
        { zh: "适合", ru: "подходить" }, { zh: "幸福", ru: "счастье" },
        { zh: "浪漫", ru: "романтичный" }, { zh: "羡慕", ru: "завидовать" },
        { zh: "加班", ru: "работать сверхурочно" }, { zh: "幽默", ru: "юмор" },
        { zh: "脾气", ru: "характер / нрав" }, { zh: "适应", ru: "адаптироваться" },
        { zh: "聚会", ru: "вечеринка / встреча" }, { zh: "差不多", ru: "почти" },
        { zh: "毕业", ru: "окончить учебу" }, { zh: "麻烦", ru: "беспокоить / проблема" },
        { zh: "友谊", ru: "дружба" }, { zh: "丰富", ru: "богатый" },
        { zh: "无聊", ru: "скучный" }, { zh: "讨厌", ru: "ненавидеть" },
        { zh: "交流", ru: "общаться" }, { zh: "理解", ru: "понимать" },
        { zh: "困难", ru: "трудность" }, { zh: "招聘", ru: "нанимать" },
        { zh: "负责", ru: "нести ответственность" }, { zh: "应聘", ru: "устраиваться на работу" },
        { zh: "符合", ru: "соответствовать" }, { zh: "律师", ru: "адвокат" },
        { zh: "专业", ru: "специальность" }, { zh: "收入", ru: "доход" },
        { zh: "诚实", ru: "честный" }, { zh: "改变", ru: "менять" },
        { zh: "顾客", ru: "клиент" }, { zh: "准时", ru: "вовремя" },
        { zh: "调查", ru: "исследовать" }, { zh: "计划", ru: "план" },
        { zh: "保证", ru: "гарантировать" }, { zh: "生意", ru: "бизнес" },
        { zh: "积累", ru: "накапливать" }, { zh: "经验", ru: "опыт" },
        { zh: "成功", ru: "успех" }, { zh: "感谢", ru: "благодарить" },
        { zh: "奖金", ru: "премия" }, { zh: "工资", ru: "зарплата" },
        { zh: "知识", ru: "знания" }, { zh: "责任", ru: "ответственность" },
        { zh: "不仅...也...", ru: "не только... но и..." }, { zh: "即使...也...", ru: "даже если..." }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    const totalQuestions = 30; // 题目数量改为30

    // 打乱数组的函数 (Fisher-Yates)
    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startGame() {
        // 切换界面
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');

        // 初始化数据
        score = 0;
        currentIndex = 0;
        currentQuestions = [];

        // 随机抽取30个单词
        const shuffledVocab = shuffleArray(vocabDB);
        const selectedVocab = shuffledVocab.slice(0, totalQuestions);

        // 生成题目
        for (let i = 0; i < totalQuestions; i++) {
            const wordObj = selectedVocab[i];
            const isRuToZh = i < (totalQuestions / 2); // 前15题俄译中，后15题中译俄
            
            const questionText = isRuToZh ? wordObj.ru : wordObj.zh;
            const correctAnswer = isRuToZh ? wordObj.zh : wordObj.ru;
            
            // 生成3个错误选项
            let wrongOptions = vocabDB.filter(v => v.zh !== wordObj.zh);
            wrongOptions = shuffleArray(wrongOptions).slice(0, 3);
            const wrongAnswers = wrongOptions.map(v => isRuToZh ? v.zh : v.ru);
            
            // 合并选项并打乱
            let options = [correctAnswer, ...wrongAnswers];
            options = shuffleArray(options);

            currentQuestions.push({
                question: questionText,
                options: options,
                correct: correctAnswer,
                type: isRuToZh ? 'ru-zh' : 'zh-ru'
            });
        }

        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuestions[currentIndex];
        
        // 更新状态栏
        document.getElementById('progress-text').innerText = `进度: ${currentIndex + 1}/${totalQuestions}`;
        document.getElementById('score-text').innerText = `得分: ${score}`;
        
        // 更新题目
        document.getElementById('mode-hint').innerText = q.type === 'ru-zh' ? '请选择对应的中文' : '请选择对应的俄语';
        document.getElementById('question-word').innerText = q.question;
        
        // 更新选项
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt === q.correct);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(btn, isCorrect) {
        // 禁用所有按钮防止重复点击
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (isCorrect) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score-text').innerText = `得分: ${score}`;
        } else {
            btn.classList.add('wrong');
            // 找出正确答案并标绿
            buttons.forEach(b => {
                if (b.innerText === currentQuestions[currentIndex].correct) {
                    b.classList.add('correct');
                }
            });
        }

        // 延迟1.2秒后进入下一题
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < totalQuestions) {
                renderQuestion();
            } else {
                endGame();
            }
        }, 1200);
    }

    function endGame() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        
        document.getElementById('final-score').innerText = `${score}/${totalQuestions}`;
        
        let msg = "";
        if (score === totalQuestions) msg = "完美！你完全掌握了这些单词！🏆";
        else if (score >= totalQuestions * 0.8) msg = "非常棒！继续保持！🌟";
        else if (score >= totalQuestions * 0.6) msg = "还不错，但还有进步空间哦！💪";
        else msg = "需要多加复习啦，加油！📚";
        
        document.getElementById('result-message').innerText = msg;
    }
</script>

</body>
</html>
