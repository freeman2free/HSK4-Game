<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK4 单词闪卡挑战</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #888888;
            --correct: #4CAF50;
            --wrong: #F44336;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei';
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }
        .game-container {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: bold;
        }
        .flashcard {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            padding: 40px 20px;
            border-radius: 15px;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .mode-hint {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
            font-weight: normal;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-family: inherit;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e2e6ea;
            border-color: #dae0e5;
            transform: translateY(-2px);
        }
        .option-btn:disabled {
            cursor: default;
        }
        .option-btn.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
        }
        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 15px;
        }
        .btn-nav {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-prev {
            background-color: #e9ecef;
            color: #495057;
        }
        .btn-prev:hover:not(:disabled) {
            background-color: #dee2e6;
        }
        .btn-next {
            background-color: var(--primary);
            color: white;
        }
        .btn-next:hover {
            background-color: #357ABD;
        }
        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background-color: #357ABD;
        }
        .result-score {
            font-size: 48px;
            color: var(--primary);
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-screen" class="screen active">
        <h1>HSK4 单词挑战</h1>
        <p>综合词汇复习</p>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 20px;">
            系统已从120+词库中为你随机抽取30题<br>前15题：俄译中<br>后15题：中译俄<br><br>
            (可手动翻页，不限答题时间)
        </p>
        <button class="btn-primary" onclick="startGame()">开始游戏</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="status-bar">
            <span id="progress-text">进度: 1/30</span>
            <span id="score-text">得分: 0</span>
        </div>
        <div class="flashcard">
            <div id="mode-hint" class="mode-hint">请选择对应的中文</div>
            <div id="question-word">Загрузка...</div>
        </div>
        <div class="options-grid" id="options-container">
        </div>
        
        <!-- 新增的底部导航按钮 -->
        <div class="nav-container">
            <button id="btn-prev" class="btn-nav btn-prev" onclick="prevQuestion()">上一个</button>
            <button id="btn-next" class="btn-nav btn-next" onclick="nextQuestion()">下一个</button>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1>挑战结束！</h1>
        <div class="result-score" id="final-score">0/30</div>
        <p id="result-message">太棒了！</p>
        <button class="btn-primary" onclick="startGame()">再玩一次</button>
    </div>
</div>

<script>
    const vocabDB = [
        { zh: "法律", ru: "закон" }, { zh: "俩", ru: "два / оба" },
        { zh: "印象", ru: "впечатление" }, { zh: "深", ru: "глубокий" },
        { zh: "熟悉", ru: "быть знакомым" }, { zh: "性格", ru: "характер" },
        { zh: "开玩笑", ru: "шутить" }, { zh: "从来", ru: "никогда (не) / всегда" },
        { zh: "最好", ru: "лучше всего" }, { zh: "共同", ru: "общий" },
        { zh: "适合", ru: "подходить" }, { zh: "幸福", ru: "счастье" },
        { zh: "生活", ru: "жизнь" }, { zh: "刚/刚才", ru: "только что / недавно" },
        { zh: "浪漫", ru: "романтичный" }, { zh: "够", ru: "достаточно" },
        { zh: "缺点", ru: "недостаток" }, { zh: "接受", ru: "принимать" },
        { zh: "羡慕", ru: "завидовать" }, { zh: "爱情", ru: "любовь" },
        { zh: "星星", ru: "звезда" }, { zh: "即使...也...", ru: "даже если..., то..." },
        { zh: "加班", ru: "работать сверхурочно" }, { zh: "亮", ru: "светлый / яркий" },
        { zh: "自然", ru: "природа / естественно" }, { zh: "原因", ru: "причина" },
        { zh: "互相", ru: "взаимно" }, { zh: "吸引", ru: "привлекать" },
        { zh: "幽默", ru: "юмор" }, { zh: "脾气", ru: "характер / нрав" },
        { zh: "不仅...也/而且...", ru: "не только..., но и..." }, { zh: "（在）...上", ru: "в / на (в отношении)" },
        { zh: "适应", ru: "адаптироваться" }, { zh: "交", ru: "дружить / заводить" },
        { zh: "平时", ru: "обычно" }, { zh: "逛", ru: "гулять" },
        { zh: "短信", ru: "СМС" }, { zh: "正好", ru: "как раз" },
        { zh: "聚会", ru: "вечеринка / встреча" }, { zh: "联系", ru: "связываться" },
        { zh: "差不多", ru: "почти" }, { zh: "专门", ru: "специально" },
        { zh: "毕业", ru: "окончить учебу" }, { zh: "麻烦", ru: "беспокоить / проблема" },
        { zh: "好像", ru: "кажется" }, { zh: "重新", ru: "заново" },
        { zh: "尽管", ru: "несмотря на" }, { zh: "真正", ru: "настоящий" },
        { zh: "友谊", ru: "дружба" }, { zh: "要知道", ru: "нужно знать" },
        { zh: "丰富", ru: "богатый" }, { zh: "无聊", ru: "скучный" },
        { zh: "讨厌", ru: "ненавидеть" }, { zh: "却", ru: "однако" },
        { zh: "周围", ru: "вокруг" }, { zh: "交流", ru: "общаться" },
        { zh: "理解", ru: "понимать" }, { zh: "镜子", ru: "зеркало" },
        { zh: "而", ru: "а / но" }, { zh: "当", ru: "когда" },
        { zh: "困难", ru: "трудность" }, { zh: "及时", ru: "вовремя" },
        { zh: "陪", ru: "сопровождать" }, { zh: "对了", ru: "кстати" },
        { zh: "开始", ru: "начинать" }, { zh: "后来", ru: "потом" },
        { zh: "最近", ru: "в последнее время" }, { zh: "垃圾", ru: "мусор" },
        { zh: "西红柿", ru: "помидор" }, { zh: "细心", ru: "внимательный" },
        { zh: "按照", ru: "в соответствии с" }, { zh: "甚至", ru: "даже" },
        { zh: "挺...的", ru: "очень..." }, { zh: "紧张", ru: "нервничать" },
        { zh: "信心", ru: "уверенность" }, { zh: "能力", ru: "способность" },
        { zh: "招聘", ru: "нанимать" }, { zh: "提供", ru: "предоставлять" },
        { zh: "负责", ru: "нести ответственность" }, { zh: "本来", ru: "изначально" },
        { zh: "应聘", ru: "устраиваться на работу" }, { zh: "材料", ru: "материал" },
        { zh: "符合", ru: "соответствовать" }, { zh: "通知", ru: "уведомлять" },
        { zh: "律师", ru: "адвокат" }, { zh: "专业", ru: "специальность" },
        { zh: "另外", ru: "кроме того" }, { zh: "收入", ru: "доход" },
        { zh: "咱们", ru: "мы" }, { zh: "安排", ru: "планировать" },
        { zh: "首先...其次...", ru: "во-первых..., во-вторых..." }, { zh: "正式", ru: "официальный" },
        { zh: "留", ru: "оставаться / оставлять" }, { zh: "诚实", ru: "честный" },
        { zh: "改变", ru: "менять" }, { zh: "感觉", ru: "чувство" },
        { zh: "判断", ru: "судить / определять" }, { zh: "顾客", ru: "клиент" },
        { zh: "准时", ru: "вовремя" }, { zh: "不管", ru: "независимо от" },
        { zh: "与", ru: "и / с" }, { zh: "约会", ru: "свидание" },
        { zh: "提", ru: "поднимать (вопрос)" }, { zh: "以为", ru: "полагать (ошибочно)" },
        { zh: "份", ru: "порция / экземпляр" }, { zh: "完全", ru: "полностью" },
        { zh: "赚", ru: "зарабатывать" }, { zh: "调查", ru: "исследовать" },
        { zh: "原来", ru: "оказывается" }, { zh: "计划", ru: "план" },
        { zh: "提前", ru: "заранее" }, { zh: "保证", ru: "гарантировать" },
        { zh: "提醒", ru: "напоминать" }, { zh: "乱", ru: "беспорядок" },
        { zh: "生意", ru: "бизнес" }, { zh: "谈", ru: "обсуждать" },
        { zh: "并", ru: "вовсе (не)" }, { zh: "积累", ru: "накапливать" },
        { zh: "经验", ru: "опыт" }, { zh: "一切", ru: "всё" },
        { zh: "成功", ru: "успех" }, { zh: "顺利", ru: "успешно" },
        { zh: "感谢", ru: "благодарить" }, { zh: "消息", ru: "новость" },
        { zh: "按时", ru: "вовремя" }, { zh: "奖金", ru: "премия" },
        { zh: "工资", ru: "зарплата" }, { zh: "方法", ru: "метод" },
        { zh: "知识", ru: "знания" }, { zh: "不得不", ru: "быть вынужденным" },
        { zh: "责任", ru: "ответственность" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    const totalQuestions = 30;

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');

        score = 0;
        currentIndex = 0;
        currentQuestions = [];

        const shuffledVocab = shuffleArray(vocabDB);
        const selectedVocab = shuffledVocab.slice(0, totalQuestions);

        for (let i = 0; i < totalQuestions; i++) {
            const wordObj = selectedVocab[i];
            const isRuToZh = i < (totalQuestions / 2);
            
            const questionText = isRuToZh ? wordObj.ru : wordObj.zh;
            const correctAnswer = isRuToZh ? wordObj.zh : wordObj.ru;
            
            let wrongOptions = vocabDB.filter(v => v.zh !== wordObj.zh);
            wrongOptions = shuffleArray(wrongOptions).slice(0, 3);
            const wrongAnswers = wrongOptions.map(v => isRuToZh ? v.zh : v.ru);
            
            let options = [correctAnswer, ...wrongAnswers];
            options = shuffleArray(options);

            currentQuestions.push({
                question: questionText,
                options: options,
                correct: correctAnswer,
                type: isRuToZh ? 'ru-zh' : 'zh-ru',
                userAnswer: null // 新增：记录用户选择的答案
            });
        }
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('progress-text').innerText = `进度: ${currentIndex + 1}/${totalQuestions}`;
        document.getElementById('score-text').innerText = `得分: ${score}`;
        document.getElementById('mode-hint').innerText = q.type === 'ru-zh' ? '请选择对应的中文' : '请选择对应的俄语';
        document.getElementById('question-word').innerText = q.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        // 渲染选项
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            
            // 如果这道题已经答过了，恢复之前的状态
            if (q.userAnswer !== null) {
                btn.disabled = true;
                if (opt === q.correct) {
                    btn.classList.add('correct');
                } else if (opt === q.userAnswer) {
                    btn.classList.add('wrong');
                }
            } else {
                // 如果还没答过，绑定点击事件
                btn.onclick = () => checkAnswer(btn, opt, q.correct);
            }
            
            optionsContainer.appendChild(btn);
        });

        // 更新底部导航按钮状态
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        
        btnPrev.disabled = (currentIndex === 0);
        
        if (currentIndex === totalQuestions - 1) {
            btnNext.innerText = "完成挑战";
        } else {
            btnNext.innerText = "下一个";
        }
    }

    function checkAnswer(btn, selectedOpt, correctOpt) {
        const q = currentQuestions[currentIndex];
        
        // 记录用户的答案
        q.userAnswer = selectedOpt;
        
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (selectedOpt === correctOpt) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score-text').innerText = `得分: ${score}`;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if (b.innerText === correctOpt) {
                    b.classList.add('correct');
                }
            });
        }
        // 注意：去掉了 setTimeout，不再自动跳转
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    function nextQuestion() {
        if (currentIndex < totalQuestions - 1) {
            currentIndex++;
            renderQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        document.getElementById('final-score').innerText = `${score}/${totalQuestions}`;
        
        let msg = "";
        if (score === totalQuestions) msg = "完美！你完全掌握了这些单词！🏆";
        else if (score >= totalQuestions * 0.8) msg = "非常棒！继续保持！🌟";
        else if (score >= totalQuestions * 0.6) msg = "还不错，但还有进步空间哦！💪";
        else msg = "需要多加复习啦，加油！📚";
        document.getElementById('result-message').innerText = msg;
    }
</script>
</body>
</html>
